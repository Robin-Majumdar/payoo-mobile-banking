<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaYoo Home</title>

    <link rel="icon" href="./assets/favicon/favicon.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome Kit  -->
    <script src="https://kit.fontawesome.com/a7397c5ed9.js" crossorigin="anonymous"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./stylesheet/styles.css">
</head>

<body>
    <section class="mx-auto min-h-screen max-w-md bg-[#F8F8F8]">

        <!-- Header Section Start -->
        <header class="bg-white flex justify-between items-center p-4 sticky top-0 z-10 border-b border-b-gray-300">
            <div class="flex gap-4">
                <div class="w-[60px]">
                    <img src="./assets/favicon/favicon.png" alt="PaYoo Logo">
                </div>

                <!-- Account Balance Section -->
                <div class="font-semibold">
                    <p class="text-lg">$ <span id="account-balance">45000</span></p>
                    <p class="text-sm text-gray-500">Available Balance</p>
                </div>
            </div>
            <div>
                <!-- <button
                    class="flex items-center bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i>
                    Log Out
                </button> -->

                <!-- Log Out Button -->
                <button id="logout-button"
                    class="flex items-center gap-2 px-4 py-2 rounded bg-red-100 text-red-600 font-semibold hover:bg-red-200 transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Log Out
                </button>
            </div>
        </header>
        <!-- Header Section End -->

        <!-- Main Content and Interaction Button Start -->
        <section class="bg-white rounded-b-2xl p-4">
            <!-- Text Part -->
            <div class="py-4 space-y-2">
                <h1 class="text-3xl font-bold">Welcome to <span class="text-purple-600 italic">PaYoo</span> </h1>
                <p class="text-sm text-gray-500">Enjoy easy and convenient financial services with us. <br>
                    Cashout charge is low and</p>
            </div>

            <!-- Interaction Button Section Start -->
            <section>
                <div class="grid grid-cols-3 mb-8 mt-4 gap-4">

                    <!-- Add Money -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-3 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/add-money.png" alt="Add Money Icon" class="w-6 h-6">
                        Add Money
                    </button>

                    <!-- Cash Out -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-3 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/cash-out.png" alt="cash Out Icon" class="w-6 h-6">
                        Cash Out
                    </button>

                    <!-- Money Transfer -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-3 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/moneytransfer.png" alt="Money Transfer Icon" class="w-6 h-6">
                        Money Transfer
                    </button>

                    <!-- Bill Pay -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-3 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/bill-pay.png" alt="Bill Pay Icon" class="w-6 h-6">
                        Bill Pay
                    </button>

                    <!-- Get Bonus -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-2 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/get-bonus.png" alt="Get Bonus Icon" class="w-6 h-6">
                        Get Bonus
                    </button>

                    <!-- Transaction History -->
                    <button class=" text-purple-800 flex flex-col items-center gap-1 px-2 py-2 text-sm font-semibold rounded-lg border border-purple-300 hover:border-purple-400 bg-purple-100
                    hover:bg-purple-200 transition-colors shadow-sm">
                        <img src="./assets/icon/transaction.png" alt="Transaction History Icon" class="w-6 h-6">
                        Transaction
                    </button>
                </div>


            </section>
            <!-- Interaction Button Section Start -->
        </section>
        <!-- Main Content and Interaction Button End -->

        <!-- Features From Section start -->

        <!-- Add Money From Start -->
        <section class="p-4">
            <h2 class="text-xl font-bold text-center">Add Money</h2>

            <div class="card bg-base-100 w-full max-w-md shadow-2xl mx-auto mt-6">
                <form class="card-body">

                    <!-- Select Your Bank -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">Select Bank</span>
                        </label>

                        <select id="select-bank" class="select select-primary">
                            <option value="" disabled selected>Select Your Bank</option>
                            <option value="dbbl">Dutch-Bangla Bank</option>
                            <option value="brac">BRAC Bank</option>
                            <option value="islami">Islami Bank</option>
                            <option value="city">City Bank</option>
                            <option value="sonali">Sonali Bank</option>
                        </select>
                    </div>

                    <!-- Bank Account Number -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">Bank Account Number</span>
                        </label>
                        <input id="bank-account-number" type="text" maxlength="11" inputmode="numeric"
                            pattern="[0-9]{11}" placeholder="11 Digit Account Number" class="input input-bordered"
                            required />
                    </div>

                    <!-- Add Amount -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">Add To Amount</span>
                        </label>
                        <input id="input-add-money" type="text" placeholder="Add amount" class="input input-bordered"
                            required />
                    </div>

                    <!-- Pin Number -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">4 Digit Pin</span>
                        </label>
                        <input id="input-pin-number" type="password" placeholder="Enter Your 4 Digit Pin"
                            class="input input-bordered" required />
                    </div>
                    <!-- Add Money Button -->
                    <div class="form-control mt-6">
                        <button id="add-money-button"
                            class="btn text-white bg-purple-600 hover:bg-purple-700 btn-primary text-lg font-semibold">Add
                            Money</button>
                    </div>
                </form>
            </div>
            <!-- Add Money From End -->
        </section>
        <!-- Add Money From End -->

        <!-- Cash Out From Start -->
        <section class="p-4 hidden">
            <h2 class="text-xl font-bold text-center">Cash Out</h2>

            <div class="card bg-base-100 w-full max-w-md shadow-2xl mx-auto mt-6">

                <form class="card-body">

                    <!-- Phone Number -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">Agent Number</span>
                        </label>
                        <input type="text" placeholder="11 Digit Number" class="input input-bordered" required />
                    </div>

                    <!-- Add Amount -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">Cash Out Amount</span>
                        </label>
                        <input id="" type="text" placeholder="Add amount to withdraw" class="input input-bordered"
                            required />
                    </div>

                    <!-- Pin Number -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-sm font-semibold">4 Digit Pin</span>
                        </label>
                        <input id="" type="password" placeholder="Enter Your 4 Digit Pin" class="input input-bordered"
                            required />
                    </div>
                    <!-- Cash Out Button -->
                    <div class="form-control mt-6">
                        <button id=""
                            class="btn text-white bg-purple-600 hover:bg-purple-700 btn-primary text-lg font-semibold">Cash
                            Out</button>
                    </div>
                </form>
            </div>
            <!-- Add Money From End -->
        </section>
        <!-- Cash Out From End -->

        <!-- Transaction History Section Start -->
        <section class="p-4 hidden">
            <h2 class="text-xl font-bold text-center">Transaction History</h2>

            <div class="card bg-base-100 w-full max-w-md shadow-2xl mx-auto mt-6">
                
            </div>
            <!-- Add Money From End -->
        </section>
        <!-- Transaction History Section End -->
        <!-- Features From Section End -->


    </section>

    <!-- Java Script + Tailwind Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./script/logIn.js"></script>
    <script src="./script/functuon.js"></script>
    <script src="./script/add-money.js"></script>
</body>

</html>
